services:
  coco-downloader:
    image: zjy8963/coco-downloader:latest
    # 本地构建时注释掉 image，取消注释 build
    # build: .
    container_name: coco-downloader
    restart: unless-stopped
    user: "0:0"  # root 权限，确保能写 NAS 挂载目录
    environment:
      - PORT=${PORT:-3000}
      - SAVE_PATH=/app/downloads
    ports:
      - "${PORT:-3000}:3000"
    # 下载目录（NAS 挂载）
    volumes:
      - /mnt/nas/music:/app/downloads
      # 适配器配置持久化
      - ./src/lib/playlist/adapter-priority.json:/app/src/lib/playlist/adapter-priority.json
